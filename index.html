<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Risk Alliance | Charter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --border: #2a2a2a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(30, 30, 30, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(20, 20, 20, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Layout wrapper */
        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 40px 120px;
            position: relative;
            z-index: 1;
        }

        /* Right sidebar */
        .right-sidebar {
            position: fixed;
            right: 40px;
            top: 80px;
            display: flex;
            flex-direction: row;
            gap: 32px;
            z-index: 100;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.3s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        /* Logo */
        .logo-container {
            margin-bottom: 80px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            text-align: center;
            width: 100%;
        }

        .logo {
            max-width: 600px;
            width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
        }

        /* Markdown content styling */
        #content {
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        #content h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 48px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        #content h2 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 3vw, 2.2rem);
            font-weight: 700;
            margin-top: 64px;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        #content h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        #content p {
            margin-bottom: 24px;
            color: var(--text-secondary);
        }

        #content strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        #content blockquote {
            border-left: 2px solid var(--text-secondary);
            padding-left: 24px;
            margin: 32px 0;
            font-style: italic;
        }

        #content blockquote p {
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        #content ul {
            list-style: none;
            margin: 24px 0;
            padding-left: 0;
        }

        #content ul li {
            position: relative;
            padding-left: 24px;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        #content ul li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-primary);
            font-weight: bold;
        }

        #content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 48px 0;
        }

        /* Charter intro section (before first hr) */
        .charter-intro p {
            font-size: 1.15rem;
            color: var(--text-primary);
            line-height: 1.8;
        }

        /* Read More Button */
        .read-more-container {
            margin-top: 48px;
            margin-bottom: 24px;
        }

        .read-more-btn {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-primary);
            padding: 16px 32px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .read-more-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-primary);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .read-more-btn:hover {
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .read-more-btn:hover::before {
            left: 0;
        }

        .read-more-btn.hidden {
            display: none;
        }

        /* Extended content */
        .extended-content {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.8s ease, opacity 0.6s ease 0.2s;
        }

        .extended-content.visible {
            max-height: none;
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .right-sidebar {
                right: 20px;
                gap: 24px;
            }
        }

        @media (max-width: 900px) {
            .right-sidebar {
                position: fixed;
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                flex-direction: row;
                justify-content: center;
                gap: 32px;
                padding: 20px;
                background: linear-gradient(to top, var(--bg-primary) 80%, transparent);
            }

            .main-content {
                padding: 60px 24px 100px;
            }

            .logo {
                max-width: 420px;
            }
        }

        /* Selection color */
        ::selection {
            background: var(--text-primary);
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Right Sidebar -->
        <nav class="right-sidebar">
            <a href="https://forum.example.com" target="_blank" rel="noopener noreferrer" class="nav-link">Forum</a>
            <a href="https://docs.example.com" target="_blank" rel="noopener noreferrer" class="nav-link">Docs</a>
            <a href="https://twitter.com/example" target="_blank" rel="noopener noreferrer" class="nav-link">Twitter</a>
        </nav>

        <main class="main-content">
            <!-- Logo -->
            <div class="logo-container">
                <img src="assets/logo.png" alt="DeFi Risk Alliance" class="logo">
            </div>

            <!-- Content will be injected here -->
            <div id="content"></div>
        </main>
    </div>

    <script>
        // Fetch and render markdown
        fetch('content.md')
            .then(response => response.text())
            .then(markdown => {
                // Split content at the first horizontal rule (---)
                const parts = markdown.split(/\n---\n/);
                const introMd = parts[0];
                const restMd = parts.slice(1).join('\n---\n');

                // Render intro
                const introHtml = marked.parse(introMd);
                
                // Render rest
                const restHtml = marked.parse(restMd);

                // Build the full HTML with read more button
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = `
                    <div class="charter-intro">${introHtml}</div>
                    <div class="read-more-container">
                        <button class="read-more-btn" onclick="showMore()">Read More</button>
                    </div>
                    <div class="extended-content" id="extendedContent">${restHtml}</div>
                `;
            })
            .catch(err => {
                console.error('Error loading content:', err);
                document.getElementById('content').innerHTML = '<p>Error loading content. Please refresh the page.</p>';
            });

        function showMore() {
            const btn = document.querySelector('.read-more-btn');
            const content = document.getElementById('extendedContent');
            
            btn.classList.add('hidden');
            content.classList.add('visible');
            
            // Smooth scroll to the extended content
            setTimeout(() => {
                content.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
